<!DOCTYPE html>
<html lang="fr">
<head>
  <style>
    body {
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Le conteneur du SVG */
    .salmonad-wrapper {
      width: 400px; /* Ajuste la taille ici */
      height: auto;
    }
  </style>
</head>
<body>

<div class="salmonad-wrapper">
  <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M320 120 C350 100 370 100 380 130 C390 160 360 180 340 170" fill="#9B59B6" stroke="black" stroke-width="3"/>
    <path d="M350 130 C370 130 380 150 370 160" fill="#FF99CC" stroke="black" stroke-width="3"/>

    <path d="M50 150 C50 100 120 80 200 80 C300 80 340 120 340 180 C340 230 250 240 150 230 C80 220 50 200 50 150 Z"
          fill="#8E44AD" stroke="black" stroke-width="3"/>

    <path d="M240 100 Q230 150 240 230 M270 110 Q260 160 270 220 M300 120 Q290 170 300 200"
          stroke="#AF7AC5" stroke-width="5" stroke-linecap="round"/>

    <path d="M100 90 L110 50 L140 85" fill="#8E44AD" stroke="black" stroke-width="3"/>
    <path d="M180 85 L210 50 L220 90" fill="#8E44AD" stroke="black" stroke-width="3"/>
    <path d="M115 65 L130 80 L110 85 Z" fill="#FF99CC"/>
    <path d="M130 230 L130 260 L150 260 L150 230" fill="#8E44AD" stroke="black" stroke-width="3"/>
    <path d="M200 230 L200 250 L220 250 L220 230" fill="#8E44AD" stroke="black" stroke-width="3"/>
    <path d="M280 210 L280 240 L300 240 L290 210" fill="#8E44AD" stroke="black" stroke-width="3"/>

    <path d="M45 160 Q100 155 150 160 Q155 180 150 190 Q100 185 50 180 Q40 170 45 160 Z"
          fill="#D35400" stroke="black" stroke-width="3"/>
    <path d="M45 160 Q100 155 150 160" fill="none" stroke="black" stroke-width="3"/>

    <g class="eye" id="eye-left">
      <circle cx="100" cy="130" r="25" fill="white" stroke="black" stroke-width="3"/>
      <circle class="pupil" cx="100" cy="130" r="6" fill="black"/>
    </g>

    <g class="eye" id="eye-right">
      <circle cx="160" cy="130" r="25" fill="white" stroke="black" stroke-width="3"/>
      <circle class="pupil" cx="160" cy="130" r="6" fill="black"/>
    </g>
  </svg>
</div>

<script>
  // Script pour suivre la souris
  document.addEventListener('mousemove', (e) => {
    const eyes = document.querySelectorAll('.eye');

    eyes.forEach(eye => {
      const pupil = eye.querySelector('.pupil');
      const eyeWhite = eye.querySelector('circle:first-child');

      const eyeRect = eyeWhite.getBoundingClientRect();
      const eyeCenterX = eyeRect.left + eyeRect.width / 2;
      const eyeCenterY = eyeRect.top + eyeRect.height / 2;

      const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);

      const maxDist = (eyeRect.width / 2) - 10;

      const x = Math.cos(angle) * maxDist;
      const y = Math.sin(angle) * maxDist;

      pupil.style.transform = `translate(${x}px, ${y}px)`;
    });
  });
</script>

</body>
</html>
