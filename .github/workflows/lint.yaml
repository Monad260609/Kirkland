name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [lts/*]

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup node env
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci
      
      - name: Install foundry-toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run foundry node, deploy contracts (& generate contracts typescript output)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          npm run chain &
          echo "Waiting for anvil to be ready..."
          for i in $(seq 1 30); do
            if curl -s -X POST --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' -H "Content-Type: application/json" http://127.0.0.1:8545 > /dev/null 2>&1; then
              echo "Anvil is ready!"
              break
            fi
            echo "Attempt $i: anvil not ready yet, waiting..."
            sleep 1
          done
          npm run deploy

      - name: Run nextjs lint
        run: npm run next:lint -- --max-warnings=0

      - name: Check typings on nextjs
        run: npm run next:check-types